<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e17;
            font-family: sans-serif;
            color: #ffffff;
        }

        .game-wrapper {
            width: 100%;
            max-width: 960px;
            height: 100%;
            max-height: 540px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-spinner, .error-panel {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #4a5d78;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        button {
            padding: 8px 16px;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="gameContainer">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>loading...</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var CDN = 'https://cdn.jsdelivr.net/gh/zynq-platform/a-dance-of-fire-and-ice/';
            var box = document.getElementById('gameContainer');
            var started = false;
            var retry = 0;

            function showError(msg) {
                if (started) return;
                box.innerHTML = '<div class="error-panel">' +
                    '<svg width="48" height="48" viewBox="0 0 24 24" fill="none">' +
                    '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#4a5d78"/>' +
                    '</svg>' +
                    '<h2 style="margin:16px 0 8px; color: #fff;">connection error</h2>' +
                    '<p style="color: #a0aec0;">' + msg + '</p>' +
                    '<button onclick="location.reload()">retry</button>' +
                    '</div>';
                box.style.minHeight = '540px';
            }

            function loadGame() {
                var s = document.createElement('script');
                s.src = CDN + 'Build/UnityLoader.js';
                
                s.onload = function() {
                    if (window.UnityLoader && !started) {
                        try {
                            window.game = UnityLoader.instantiate('gameContainer', CDN + 'Build/adofaiii4.json');
                            started = true;
                        } catch (e) {
                            showError('unity error');
                        }
                    } else if (!started) {
                        showError('loader fail');
                    }
                };

                s.onerror = function() {
                    if (retry < 2) {
                        retry++;
                        setTimeout(loadGame, 500);
                    } else {
                        showError('cdn unreachable');
                    }
                };

                document.head.appendChild(s);
            }

            fetch(CDN + 'Build/adofaiii4.json', { method: 'HEAD' })
                .then(function() {
                    loadGame();
                })
                .catch(function() {
                    loadGame();
                });
        })();
    </script>
</body>
</html>
