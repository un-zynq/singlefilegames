            var box = document.getElementById('gameContainer');
            var started = false;
            var retry = 0;
            var baseInterceptorActive = true;

            function err(msg) {
                if (started) return;
                box.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:540px;background:rgba(14,18,31,0.9);color:#ffaa44;font-family:monospace;text-align:center;padding:2rem"><svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#ffaa44"/></svg><h2 style="margin:16px 0 8px">connection error</h2><p>' + msg + '</p><button onclick="location.reload()" style="margin-top:24px;background:#2a3f6e;border:0;padding:8px 24px;border-radius:32px;color:#fff;cursor:pointer">retry</button></div>';
                box.style.minHeight = '540px';
            }

            function loadUnity() {
                var s = document.createElement('script');
                s.src = CDN + 'Build/UnityLoader.js';
                s.onload = function() {
                    if (window.UnityLoader) {
                        if (!started) {
                            try {
                                window.game = UnityLoader.instantiate('gameContainer', CDN + 'Build/adofaiii4.json');
                                started = true;
                            } catch (e) {
                                err('unity error');
                            }
                        }
                    } else {
                        err('loader fail');
                    }
                };
                s.onerror = function() {
                    if (retry < 2) {
                        retry++;
                        setTimeout(loadUnity, 500);
                    } else {
                        err('cdn unreachable');
                    }
                };
                if (baseInterceptorActive) {
                    var originalFetch = window.fetch;
                    window.fetch = function(url, options) {
                        if (typeof url === 'string' && url.includes('adofaiii4.wasm')) {
                            return originalFetch(url, options).catch(function() {
                                return new Response(new ArrayBuffer(0), {
                                    status: 200,
                                    statusText: 'OK',
                                    headers: { 'Content-Type': 'application/octet-stream' }
                                });
                            });
                        }
                        return originalFetch(url, options);
                    };
                    window.fetchInterceptorActive = true;
                }
                document.head.appendChild(s);
            }

            function probe() {
                fetch(CDN + 'Build/adofaiii4.json', { method: 'HEAD' })
                    .then(function(r) {
                        if (r.ok) loadUnity();
                        else loadUnity();
                    })
                    .catch(function() {
                        loadUnity();
                    });
            }
            probe();
        })();
    </script>
</body>
</html>
