<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <base href="https://cdn.jsdelivr.net/gh/zynq-platform/bloons-tower-defense-2/">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    #ruffle-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #player {
      width: 100%;
      height: 100%;
    }
  </style>

  <script src="ruffle.js"></script>
</head>
<body>

  <div id="ruffle-container"></div>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      "autoplay": "on",
      "unmuteOverlay": "hidden"
    };

    window.addEventListener("DOMContentLoaded", () => {
      const ruffle = window.RufflePlayer.newest();
      
      if (!ruffle) {
        console.error("Ruffle failed to load.");
        return;
      }

      const player = ruffle.createPlayer();
      player.id = "player";
      
      const container = document.getElementById("ruffle-container");
      container.appendChild(player);

      player.load("https://cdn.jsdelivr.net/gh/zynq-platform/bloons-tower-defense-2/btd2.swf");
    });
  </script>

</body>
</html>
