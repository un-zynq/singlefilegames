<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Backrooms 2D</title>
  <style>
    body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
    #c{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
    canvas{width:100%;height:100%;display:block;outline:none}
    #l{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:99;transition:opacity .8s}
    #r{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    #f{width:0%;height:100%;background:#fff;box-shadow:0 0 10px #fff;transition:width .3s ease-out}
  </style>
</head>
<body>
  <div id="c">
    <canvas id="cvs"></canvas>
    <div id="l"><div id="r"><div id="f"></div></div></div>
  </div>

  <script>
    (async function ultraSafeWrapper() {
      // De globale try-catch die ALLES afvangt
      try {
        const el = id => document.getElementById(id);
        const fill = el("f"), loader = el("l"), canvas = el("cvs");
        const base = "https://cdn.jsdelivr.net/gh/un-zynq/g5/backrooms-2d/sfBuild/7-21-23";
        let createdUrls = [];

        // Functie om chunks te downloaden met foutafhandeling per chunk
        async function secureFetch(ext, parts) {
          try {
            let chunks = [];
            for (let i = 1; i <= parts; i++) {
              const res = await fetch(`${base}.${ext}.part${i}`, { priority: "high" });
              if (!res.ok) throw new Error(`Deel ${i} faalt`);
              const b = await res.blob();
              chunks.push(b);
              // Update loader tijdens het downloaden van de blobs (eerste 40%)
              if(fill) fill.style.width = (chunks.length / (parts * 2) * 40) + "%";
            }
            const blob = new Blob(chunks, { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            createdUrls.push(url);
            return url;
          } catch (e) {
            console.error("Blob download error:", e);
            return `${base}.${ext}`; // Fallback naar directe URL
          }
        }

        async function launch() {
          try {
            // 1. Download de data via blobs
            const [dUrl, wUrl] = await Promise.all([
              secureFetch("data", 4),
              secureFetch("wasm", 4)
            ]);

            // 2. Configureer Unity
            const config = {
              dataUrl: dUrl,
              frameworkUrl: base + ".framework.js",
              codeUrl: wUrl,
              streamingAssetsUrl: "StreamingAssets",
              companyName: "JujuProdGames",
              productName: "Backrooms 2D",
              devicePixelRatio: 1,
            };

            // 3. Laad de Unity Loader Script
            const script = document.createElement("script");
            script.src = base + "-loader.js";
            
            script.onload = () => {
              // DE KRITIEKE ZONE: Hier ging het mis met de URL
              try {
                if (typeof createUnityInstance === "undefined") throw new Error("Loader missing");

                createUnityInstance(canvas, config, (progress) => {
                  // Voortgang van 40% naar 100%
                  try {
                    if(fill) fill.style.width = (40 + (progress * 60)) + "%";
                  } catch(pErr) {}
                }).then((instance) => {
                  try {
                    if(fill) fill.style.width = "100%";
                    setTimeout(() => {
                      if(loader) loader.style.opacity = "0";
                      setTimeout(() => {
                        if(loader) loader.remove();
                        createdUrls.forEach(u => URL.revokeObjectURL(u));
                      }, 800);
                    }, 500);
                  } catch(postErr) {}
                }).catch(err => {
                  console.error("Unity Instance Rejected:", err);
                });

              } catch (unityInitErr) {
                // Als de 'Invalid URL' error hier komt, dwingen we een directe start
                console.error("URL/Init Error opgevangen. Noodstart actief.");
                config.dataUrl = base + ".data";
                config.codeUrl = base + ".wasm";
                
                // Laatste poging zonder blobs
                createUnityInstance(canvas, config, (p) => {
                  if(fill) fill.style.width = (p * 100) + "%";
                });
              }
            };

            script.onerror = () => { throw new Error("Script load error"); };
            document.body.appendChild(script);

          } catch (launchErr) {
            console.error("Launch sequence failed:", launchErr);
          }
        }

        // Start de machine
        if (document.readyState === 'complete') {
          launch().catch(() => {});
        } else {
          window.addEventListener('load', () => launch().catch(() => {}));
        }

      } catch (fatal) {
        // Zelfs als ALLES hierboven faalt, crasht de browser niet
        console.error("Fatale systeemfout:", fatal);
      }
    })();
  </script>
</body>
</html>
