<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arcane · Game Library</title>
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

  <style>
    /* reset & design tokens */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg0: #080809;
      --bg1: #0d0d0f;
      --bg2: #111114;
      --bg3: #17171b;
      --bg4: #1e1e24;
      --border: rgba(255,255,255,0.055);
      --border-hover: rgba(255,255,255,0.10);
      --border-active: rgba(160,160,255,0.25);
      --text-primary: #e8e8ec;
      --text-secondary: #888895;
      --text-muted: #4a4a55;
      --accent: #7b6fff;
      --accent-dim: rgba(123,111,255,0.12);
      --accent-dim2: rgba(123,111,255,0.07);
      --radius-sm: 6px;
      --radius-md: 9px;
      --radius-lg: 13px;
    }

    body {
      background: var(--bg0);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 13px;
    }

    /* --- sidebar --- */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .search-wrap { position: relative; }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px 7px 28px;
      font-size: 12px;
      color: var(--text-primary);
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus { border-color: var(--border-active); background: var(--bg4); }

    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 8px 4px;
    }

    .game-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 9px;
      margin-bottom: 1px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-item:hover { background: var(--bg3); color: var(--text-primary); }
    .game-item.active { background: var(--accent-dim); color: var(--accent); }
    .game-item .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border-hover);
      flex-shrink: 0;
    }
    .game-item.active .dot { background: var(--accent); }

    .sidebar-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3ecf8e;
      box-shadow: 0 0 6px rgba(62,207,142,0.5);
    }
    .status-dot.err { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    #game-count { font-size: 11px; color: var(--text-muted); }

    /* --- main panel --- */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg0); }

    .toolbar {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-right: 4px;
    }

    .counter-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .sort-select {
      margin-left: auto;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .sort-select:hover { border-color: var(--border-hover); }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
    }
    .view-btn {
      background: transparent;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .view-btn.active { background: var(--bg4); color: var(--text-primary); }

    .games-container { flex: 1; overflow-y: auto; padding: 18px 20px; }
    .games-container::-webkit-scrollbar { width: 4px; }
    .games-container::-webkit-scrollbar-track { background: transparent; }
    .games-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
    .list-view { display: flex; flex-direction: column; gap: 3px; }

    .game-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px 14px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      pointer-events: none;
    }
    .game-card:hover { background: var(--bg3); border-color: var(--border-hover); }
    .game-card.active { background: var(--accent-dim2); border-color: var(--border-active); }

    .game-card .card-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--bg4);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      margin-bottom: 10px;
      color: var(--text-muted);
    }
    .game-card.active .card-icon { border-color: var(--border-active); color: var(--accent); }

    .game-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      text-transform: capitalize;
      line-height: 1.35;
      word-break: break-word;
    }

    .list-view .game-card {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .list-view .card-icon { margin-bottom: 0; width: 22px; height: 22px; flex-shrink: 0; font-size: 11px; }

    .state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; }
    .state.show { display: flex; }

    .spinner-ring {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--bg4);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-label { font-size: 12px; color: var(--text-muted); }
    .state-sub { font-size: 11px; color: var(--text-muted); opacity: 0.6; max-width: 200px; text-align: center; }

    .toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bg3);
      border: 1px solid var(--border-hover);
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: rgba(239,68,68,0.3); color: #ef9f9f; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">✦ GAMESHELF</div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search games…" autocomplete="off">
    </div>
  </div>
  <div class="sidebar-list" id="sidebar-list">
    <div class="sidebar-section-label">All games</div>
  </div>
  <div class="sidebar-footer">
    <div class="status-dot" id="status-dot"></div>
    <span id="game-count">—</span>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <span class="toolbar-title">Games</span>
    <span class="counter-badge" id="result-counter">—</span>
    <select id="sort-select" class="sort-select">
      <option value="alpha">A → Z</option>
      <option value="alpha-desc">Z → A</option>
    </select>
    <div class="view-toggle">
      <button id="grid-btn" class="view-btn active">Grid</button>
      <button id="list-btn" class="view-btn">List</button>
    </div>
  </div>

  <div class="games-container">
    <div id="loading-state" class="state show">
      <div class="spinner-ring"></div>
      <span class="state-label">Loading library…</span>
    </div>
    <div id="empty-state" class="state">
      <span style="font-size:22px;color:var(--text-muted)">◌</span>
      <span class="state-label">No games found</span>
      <span class="state-sub">Try a different search term</span>
    </div>
    <div id="error-state" class="state">
      <span style="font-size:22px;color:#ef4444">⚠</span>
      <span class="state-label" id="error-msg">Failed to load</span>
      <span class="state-sub">Check your connection and try again</span>
    </div>
    <div id="game-grid" class="grid-view" style="display:none"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  (function() {
    const TOKEN = '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'; // I know it is public but it doesn't do much.
    const OWNER = 'un-zynq';
    const REPO = 'singlefilegames';
    const BRANCH = 'main';

    let allGames = [];
    let commitSha = null;
    let searchTerm = '';
    let currentView = 'grid';
    let sortOrder = 'alpha';
    let activeCard = null;
    let activeItem = null;
    let useAuth = true;
    const preloadedUrls = new Set();

    // DOM elements
    const $search = document.getElementById('search');
    const $sidebarList = document.getElementById('sidebar-list');
    const $grid = document.getElementById('game-grid');
    const $loading = document.getElementById('loading-state');
    const $empty = document.getElementById('empty-state');
    const $error = document.getElementById('error-state');
    const $errorMsg = document.getElementById('error-msg');
    const $counter = document.getElementById('result-counter');
    const $count = document.getElementById('game-count');
    const $sort = document.getElementById('sort-select');
    const $gridBtn = document.getElementById('grid-btn');
    const $listBtn = document.getElementById('list-btn');
    const $toast = document.getElementById('toast');
    const $statusDot = document.getElementById('status-dot');

    let toastTimer;
    function toast(msg, isErr = false) {
      clearTimeout(toastTimer);
      $toast.textContent = msg;
      $toast.className = 'toast show' + (isErr ? ' err' : '');
      toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
    }

    function fmt(path) {
      return path.replace(/\.html$/i, '').replace(/[-_]/g, ' ').trim() || 'untitled';
    }

    function preloadGameCdn(path) {
      if (!commitSha) return;
      const url = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${commitSha}/${path}`;
      
      if (preloadedUrls.has(url)) return;
      preloadedUrls.add(url);

      const link = document.createElement('link');
      link.rel = 'preload';
      link.href = url;
      link.as = 'fetch';
      link.crossOrigin = 'anonymous';
      document.head.appendChild(link);
    }

    function esc(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    function gameIcon(name) {
      const n = name.toLowerCase();
      if (n.includes('chess') || n.includes('board')) return '♟';
      if (n.includes('snake')) return '○';
      if (n.includes('tetris') || n.includes('block')) return '□';
      if (n.includes('maze') || n.includes('dungeon')) return '⊞';
      if (n.includes('shoot') || n.includes('gun')) return '◎';
      if (n.includes('race') || n.includes('car')) return '◇';
      if (n.includes('space') || n.includes('asteroid')) return '✦';
      if (n.includes('card') || n.includes('poker')) return '◈';
      if (n.includes('puzzle')) return '⊡';
      return '▸';
    }

    async function smartFetch(url) {
      const headers = { 'Accept': 'application/vnd.github.v3+json' };
      if (useAuth && TOKEN) {
        headers['Authorization'] = `token ${TOKEN}`;
      }

      let res = await fetch(url, { headers });

      if (!res.ok && (res.status === 403 || res.status === 401) && useAuth) {
        console.warn(`Token overschreden of geweigerd (HTTP ${res.status}). Fallback actief.`);
        useAuth = false;
        const fallbackHeaders = { 'Accept': 'application/vnd.github.v3+json' };
        res = await fetch(url, { fallbackHeaders });
      }

      return res;
    }

    async function fetchCommit() {
      const r = await smartFetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/ref/heads/${BRANCH}`);
      if (!r.ok) throw new Error(`ref ${r.status}`);
      return (await r.json()).object.sha;
    }

    async function fetchGameList(sha) {
      const cr = await smartFetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/commits/${sha}`);
      if (!cr.ok) throw new Error(`commit ${cr.status}`);
      const c = await cr.json();
      const tr = await smartFetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${c.tree.sha}?recursive=1`);
      if (!tr.ok) throw new Error(`tree ${tr.status}`);
      const t = await tr.json();
      
      // CRITIEK FILTER: Alleen bestanden die .html zijn EN GEEN slash (/) bevatten (dus puur top-level/root)
      return (t.tree || []).filter(f => 
        f.type === 'blob' && 
        f.path && 
        f.path.endsWith('.html') && 
        !f.path.includes('/')
      ).map(f => ({ path: f.path }));
    }

    function filtered() {
      if (!searchTerm.trim()) return [...allGames];
      const q = searchTerm.toLowerCase();
      return allGames.filter(g => fmt(g.path).toLowerCase().includes(q));
    }

    function sortedList(arr) {
      return [...arr].sort((a, b) => {
        const na = fmt(a.path), nb = fmt(b.path);
        return sortOrder === 'alpha' ? na.localeCompare(nb) : nb.localeCompare(na);
      });
    }

    function setState(which) {
      $loading.classList.remove('show');
      $empty.classList.remove('show');
      $error.classList.remove('show');
      $grid.style.display = 'none';
      if (which === 'loading') $loading.classList.add('show');
      else if (which === 'empty') $empty.classList.add('show');
      else if (which === 'error') $error.classList.add('show');
      else { $grid.style.display = ''; }
    }

    function renderSidebar(list) {
      $sidebarList.innerHTML = '<div class="sidebar-section-label">All games</div>';
      for (const game of list.slice(0, 60)) {
        const name = fmt(game.path);
        const btn = document.createElement('button');
        btn.className = 'game-item';
        btn.setAttribute('data-path', game.path);
        btn.innerHTML = `<span class="dot"></span>${esc(name)}`;
        
        btn.addEventListener('mouseenter', () => preloadGameCdn(game.path));
        
        btn.addEventListener('click', () => {
          const card = document.querySelector(`.game-card[data-path="${CSS.escape(game.path)}"]`);
          if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); card.click(); }
          else launch(game.path, btn);
        });
        $sidebarList.appendChild(btn);
      }
    }

    function injectAlertFilter(tabWindow) {
      if (!tabWindow) return;
      const originalAlert = tabWindow.alert;
      tabWindow.alert = function(message) {
        if (typeof message === 'string') {
          const lowerMsg = message.toLowerCase();
          if (lowerMsg.includes("exported games won't work") ||
              lowerMsg.includes("until you upload them") ||
              lowerMsg.includes("file:/// protocol") ||
              lowerMsg.includes("browsers block many features") ||
              lowerMsg.includes("for security reasons") ||
              lowerMsg.includes("won't work until you upload")) {
            return;
          }
        }
        if (originalAlert) originalAlert.call(tabWindow, message);
        else tabWindow.alert(message);
      };
    }

    async function launch(path, elem) {
      if (activeCard) activeCard.classList.remove('active');
      if (activeItem) activeItem.classList.remove('active');
      activeCard = elem;
      elem.classList.add('active');

      const sidebarMatch = document.querySelector(`.game-item[data-path="${CSS.escape(path)}"]`);
      if (sidebarMatch) { activeItem = sidebarMatch; sidebarMatch.classList.add('active'); }

      if (!commitSha) {
        toast('Resolving…');
        try {
          commitSha = await fetchCommit();
        } catch (err) {
          toast(`Error: ${err.message}`, true);
          elem.classList.remove('active');
          activeCard = null;
          return;
        }
      }

      const url = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${commitSha}/${path}`;
      const name = fmt(path);
      toast(`Opening ${name}…`);

      try {
        const tab = window.open('about:blank', '_blank');
        if (!tab) { window.open(url, '_blank'); return; }
        
        tab.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${name}</title><style>body{background:#080809;color:#888;display:flex;align-items:center;justify-content:center;font-family:monospace;height:100vh;margin:0;font-size:12px}</style></head><body>loading game…</body></html>`);
        tab.document.close();
        
        const res = await fetch(url, { cache: 'force-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let html = await res.text();
        
        const filterScript = `
        <script>
          (function() {
            const nativeAlert = window.alert;
            window.alert = function(msg) {
              if (typeof msg === 'string') {
                const lower = msg.toLowerCase();
                if (lower.includes('exported games won\'t work') ||
                    lower.includes('until you upload them') ||
                    lower.includes('file:/// protocol') ||
                    lower.includes('browsers block many features') ||
                    lower.includes('for security reasons') ||
                    lower.includes("won't work until you upload")) {
                  return;
                }
              }
              nativeAlert.call(window, msg);
            };
          })();
        <\/script>
        `;
        
        if (html.match(/<head[^>]*>/i)) {
          html = html.replace(/<head[^>]*>/i, match => match + filterScript);
        } else if (html.match(/<html[^>]*>/i)) {
          html = html.replace(/<html[^>]*>/i, match => match + '<head>' + filterScript + '</head>');
        } else {
          html = filterScript + html;
        }
        
        tab.document.open();
        tab.document.write(html);
        tab.document.close();
        
        try { injectAlertFilter(tab); } catch(e) {}
        try { tab.document.title = name; } catch(_) {}
        tab.focus();
      } catch (err) {
        toast(`Failed: ${err.message}`, true);
        elem.classList.remove('active');
        activeCard = null;
        window.open(url, '_blank');
      }
    }

    function render() {
      const list = sortedList(filtered());
      const n = list.length;
      $counter.textContent = n ? `${n} game${n !== 1 ? 's' : ''}` : '0';
      $count.textContent = n;

      if (!n) { setState('empty'); renderSidebar(list); return; }
      setState('grid');

      $grid.className = currentView === 'grid' ? 'grid-view' : 'list-view';
      $grid.innerHTML = '';

      for (const game of list) {
        const name = fmt(game.path);
        const icon = gameIcon(name);
        const card = document.createElement('div');
        card.className = 'game-card';
        card.setAttribute('data-path', game.path);
        card.innerHTML = `<div class="card-icon">${icon}</div><div class="game-name">${esc(name)}</div>`;
        
        card.addEventListener('mouseenter', () => preloadGameCdn(game.path));
        
        card.addEventListener('click', e => { e.stopPropagation(); launch(game.path, card); });
        $grid.appendChild(card);
      }
      renderSidebar(list);
    }

    // Event listeners
    $search.addEventListener('input', e => { searchTerm = e.target.value; render(); });
    $sort.addEventListener('change', e => { sortOrder = e.target.value; render(); });
    $gridBtn.addEventListener('click', () => { currentView = 'grid'; $gridBtn.classList.add('active'); $listBtn.classList.remove('active'); render(); });
    $listBtn.addEventListener('click', () => { currentView = 'list'; $listBtn.classList.add('active'); $gridBtn.classList.remove('active'); render(); });

    async function init() {
      setState('loading');
      $statusDot.className = 'status-dot';
      try {
        const sha = await fetchCommit();
        commitSha = sha;
        const games = await fetchGameList(sha);
        allGames = games;
        if (!allGames.length) throw new Error('No HTML files found in root');
        render();
        $statusDot.className = 'status-dot';
        toast(`${allGames.length} root games loaded`);
      } catch (err) {
        setState('error');
        $errorMsg.textContent = err.message || 'Connection error';
        $count.textContent = 'err';
        $statusDot.className = 'status-dot err';
        toast('Load failed', true);
      }
    }

    init();
  })();
</script>
</body>
</html>
