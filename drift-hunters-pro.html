    function InitApi(_appId) 
    {

    function ExternEval() 
    {
        console.log("ExternEval");
        
        var dateNow = new Date();
        var secondsSinceEpoch = Math.round(dateNow.getTime() / 1000);
        
        if (window.callTime != undefined && 
            secondsSinceEpoch - window.callTime > 180)
        {
            console.log('ExternEval 2');
            
            window.callTime = secondsSinceEpoch;
            
            if (typeof preroll !== 'undefined')
            {
                if (window[preroll.config.loaderObjectName] != undefined)

<body style= "margin: 0px; padding: 0px; overflow: hidden;">
    <div id="gameContainer">
        <canvas id="unity-canvas" data-pixel-art=""></canvas>
        <script src="Build/game.loader.js"></script>
        <script>
            var canvas = document.querySelector("#unity-canvas");
            
            async function loadSplitData() {
                try {
                    console.log("Loading split game data parts...");
                    
                    const part1Response = await fetch("Build/game.data.unityweb.part1");
                    const part2Response = await fetch("Build/game.data.unityweb.part2");
                    
                    if (!part1Response.ok || !part2Response.ok) {
                        throw new Error("Cannot find part1 or part2 files");
                    }
                    
                    const part1Blob = await part1Response.blob();
                    const part2Blob = await part2Response.blob();
                    
                    const totalSize = part1Blob.size + part2Blob.size;
                    console.log(`Part1 size: ${part1Blob.size}, Part2 size: ${part2Blob.size}, Total: ${totalSize}`);
                    
                    const combinedArray = new Uint8Array(totalSize);
                    
                    const part1Buffer = await part1Blob.arrayBuffer();
                    const part2Buffer = await part2Blob.arrayBuffer();
                    
                    combinedArray.set(new Uint8Array(part1Buffer), 0);
                    combinedArray.set(new Uint8Array(part2Buffer), part1Blob.size);
                    
                    const combinedBlob = new Blob([combinedArray], { type: "application/octet-stream" });
                    const combinedUrl = URL.createObjectURL(combinedBlob);
                    
                    return combinedUrl;
                } catch (error) {
                    console.error("Error loading split data:", error);
                    console.log("Falling back to single file mode");
                    return "Build/game.data.unityweb";
                }
            }
            
            var config = {
                dataUrl: null,
                frameworkUrl: "Build/game.framework.js.unityweb",
                codeUrl: "Build/game.wasm.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "FreezeNova",
                productName: "Crazy Drifter",
                productVersion: "0.1",
            };
            
            var scaleToFit;
            try {
                scaleToFit = !!JSON.parse("true");
            } catch (e) {
                scaleToFit = true;
            }
            
            function progressHandler(progress) {
                var percent = progress * 100 + '%';
                canvas.style.background = 'linear-gradient(to right, white, white ' + percent + ', transparent ' + percent + ', transparent) no-repeat center';
                canvas.style.backgroundSize = '100% 1rem';
            }
            
            function onResize() {
                var container = canvas.parentElement;
                var w;
                var h;

                if (scaleToFit) {
                    w = window.innerWidth;
                    h = window.innerHeight;

                    var r = 540 / 960;

                    if (w * r > window.innerHeight) {
                        w = Math.min(w, Math.ceil(h / r));
                    }
                    h = Math.floor(w * r);
                } else {
                    w = 960;
                    h = 540;
                }

                container.style.width = canvas.style.width = w + "px";
                container.style.height = canvas.style.height = h + "px";
                container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
                container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
            }
            
            var gameInstance;
            
            async function startGame() {
                try {
                    const dataUrl = await loadSplitData();
                    config.dataUrl = dataUrl;
                    
                    console.log("Starting Unity with data from:", dataUrl);
                    
                    createUnityInstance(canvas, config, progressHandler).then(function (instance) {
                        canvas = instance.Module.canvas;
                        onResize();
                        gameInstance = instance;
                        
                        if (config.dataUrl.startsWith("blob:")) {
                            setTimeout(() => {
                                URL.revokeObjectURL(config.dataUrl);
                                console.log("Revoked blob URL");
                            }, 30000);
                        }
                    }).catch(function(error) {
                        console.error("Unity failed to start:", error);
                        canvas.style.background = '#000';
                        canvas.style.display = 'flex';
                        canvas.style.alignItems = 'center';
                        canvas.style.justifyContent = 'center';
                        canvas.style.color = 'white';
                        canvas.style.fontFamily = 'monospace';
                        canvas.style.fontSize = '14px';
                        canvas.style.textAlign = 'center';
                        const errorMsg = document.createElement('div');
                        errorMsg.style.position = 'absolute';
                        errorMsg.style.top = '50%';
                        errorMsg.style.left = '50%';
                        errorMsg.style.transform = 'translate(-50%, -50%)';
                        errorMsg.style.color = '#ff6666';
                        errorMsg.style.backgroundColor = 'rgba(0,0,0,0.8)';
                        errorMsg.style.padding = '20px';
                        errorMsg.style.borderRadius = '10px';
                        errorMsg.style.zIndex = '1000';
                        errorMsg.innerHTML = 'Game load error:<br>Check if game.data.unityweb.part1 and .part2 exist in the Build folder';
                        document.body.appendChild(errorMsg);
                    });
                } catch (error) {
                    console.error("Failed to initialize game:", error);
                    canvas.style.background = '#000';
                    const errorDiv = document.createElement('div');
                    errorDiv.style.position = 'absolute';
                    errorDiv.style.top = '50%';
                    errorDiv.style.left = '50%';
                    errorDiv.style.transform = 'translate(-50%, -50%)';
                    errorDiv.style.color = '#ff8888';
                    errorDiv.style.backgroundColor = 'rgba(0,0,0,0.8)';
                    errorDiv.style.padding = '20px';
                    errorDiv.style.borderRadius = '10px';
                    errorDiv.style.fontFamily = 'monospace';
                    errorDiv.style.textAlign = 'center';
                    errorDiv.style.zIndex = '1000';
                    errorDiv.innerHTML = 'Error: Cannot load game.data.unityweb.part1 and .part2<br>Make sure both files are in the Build folder';
                    document.body.appendChild(errorDiv);
                }
            }
            
            startGame();
            
            window.addEventListener('resize', onResize);
            onResize();
        </script>
    </div>
</body>
