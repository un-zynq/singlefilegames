<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <style>
    body,html{margin:0;padding:0;width:100%;height:100%;background:#968B3B;overflow:hidden;touch-action:none}
    #c{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
    canvas{width:100%;height:100%;display:block;outline:none}
    #l{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:99;transition:opacity .8s}
    #l::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:url('https://cdn.jsdelivr.net/gh/un-zynq/g5/backrooms-2d/assets/bg.png') center/cover no-repeat;filter:blur(5px);z-index:-1}
    #r{width:200px;height:2px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;position:relative}
    #f{width:0%;height:100%;background:#fff;box-shadow:0 0 10px #fff;transition:width .3s}
    #unity-warning{display:none!important}
  </style>
</head>
<body>
  <div id="c">
    <canvas id="cvs"></canvas>
    <div id="l">
      <div id="r">
        <div id="f"></div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      const el = id => document.getElementById(id);
      const fill = el("f"), loader = el("l"), canvas = el("cvs");
      const base = "https://cdn.jsdelivr.net/gh/un-zynq/g5/backrooms-2d/sfBuild/7-21-23";

      async function fetchGameData(ext, parts) {
        let chunks = [];
        for (let i = 1; i <= parts; i++) {
          const r = await fetch(`${base}.${ext}.part${i}`, { priority: "high" });
          if (!r.ok) throw 0;
          chunks.push(await r.blob());
        }
        const blob = new Blob(chunks);
        chunks = null;
        return URL.createObjectURL(blob);
      }

      async function start() {
        try {
          const [dUrl, wUrl] = await Promise.all([
            fetchGameData("data", 4),
            fetchGameData("wasm", 4)
          ]);

          fill.style.width = "40%";

          const config = {
            dataUrl: dUrl,
            frameworkUrl: base + ".framework.js",
            codeUrl: wUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "JujuProdGames",
            productName: "Backrooms 2D",
            devicePixelRatio: 1,
            matchWebGLToCanvasSize: true,
            cacheControl: () => "no-cache",
            indexedDB: null,
            webglContextAttributes: {
              alpha: false,
              depth: true,
              stencil: false,
              antialias: false,
              premultipliedAlpha: false,
              preserveDrawingBuffer: false,
              powerPreference: "high-performance",
              failIfMajorPerformanceCaveat: false
            }
          };

          const s = document.createElement("script");
          s.src = base + "-loader.js";
          s.onload = () => {
            createUnityInstance(canvas, config, (p) => {
              fill.style.width = (40 + (p * 60)) + "%";
            }).then((ui) => {
              fill.style.width = "100%";
              setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                  loader.remove();
                  URL.revokeObjectURL(dUrl);
                  URL.revokeObjectURL(wUrl);
                }, 800);
              }, 400);
            }).catch(err => {
              location.reload();
            });
          };
          document.body.appendChild(s);
        } catch (e) {}
      }

      if ('requestIdleCallback' in window) {
        window.requestIdleCallback(() => start());
      } else {
        window.addEventListener('load', start);
      }
    })();
  </script>
</body>
</html>
