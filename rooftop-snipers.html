<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooftop Snipers</title>

    <base href="https://cdn.jsdelivr.net/gh/zynq-platform/rooftop-snipers/">

    <meta name="description" content="Rooftop Snipers is a pixel-style shooting game where you have to shoot famous characters off of the roof. You can play in single or two-player mode.">
    <meta name="keywords" content="games, unblocked games, web games, online games, fun, rooftop snipers">
    <meta name="author" content="3kh0">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">

    <link rel="apple-touch-icon" href="img/thumb.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        /* Zorgt ervoor dat de game écht het volledige scherm vult zonder scrollbalken */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        
        .webgl-content, #gameContainer {
            width: 100%;
            height: 100vh;
        }

        /* FIX: Zorgt ervoor dat het Unity canvas scherpe pixels behoudt (geen blur) */
        canvas, #gameContainer canvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }
    </style>

    <script src="TemplateData/UnityProgress.js"></script>
    <script src="js/main.js"></script>
    <script src="TemplateData/UnityLoader.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var gameInstance = UnityLoader.instantiate(
                "gameContainer",
                "Build/rooftop-snipers.json",
                {
                    onProgress: UnityProgress,
                    Module: {
                        onRuntimeInitialized: function () {
                            if (typeof UnityProgress === "function") {
                                UnityProgress(gameInstance, "complete");
                            }
                        },
                    },
                }
            );
        });
    </script>
</head>
<body>

    <div class="webgl-content">
        <div id="gameContainer"></div>
    </div>

</body>
</html>
