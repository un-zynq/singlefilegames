<!doctype html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/zynq-platform/eaglercraft-hrn-client-1-8-8/">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
    <script>
        (function () {
            "use strict";
            const urlParams = new URLSearchParams(window.location.search);
            window.QUALITY = parseFloat(urlParams.get("q")) || 0.8;
            try {
                Object.defineProperty(window, "devicePixelRatio", {
                    get: function () { return window.QUALITY; },
                    set: function () {},
                    configurable: false,
                });
                if (window.screen) {
                    Object.defineProperty(window.screen, "devicePixelRatio", {
                        get: function () { return window.QUALITY; },
                        configurable: false,
                    });
                }
            } catch (e) {}
            var origGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function (type, attrs) {
                if (type === "webgl" || type === "webgl2" || type === "experimental-webgl") {
                    attrs = attrs || {};
                    attrs.powerPreference = "high-performance";
                    return origGetContext.call(this, type, attrs);
                }
                return origGetContext.call(this, type, attrs);
            };
            var isTabVisible = !document.hidden;
            document.addEventListener("visibilitychange", () => isTabVisible = !document.hidden, true);
            var origRAF = window.requestAnimationFrame;
            window.requestAnimationFrame = function (callback) {
                return origRAF(function (timestamp) {
                    if (!isTabVisible) return;
                    callback(timestamp);
                });
            };
            ["contextmenu", "dragstart", "selectstart", "gesturestart", "gesturechange", "gestureend"]
                .forEach(evt => document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, true));
        })();
    </script>
    <script src="lib/launcher.js"></script>
    <script src="lib/util.js"></script>
    <script src="lib/wispcraft.js"></script>
    <script src="lib/largeEPK.js"></script>
    <script src="lib/sha256.js"></script>
    <script src="bootstrap.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Inter", sans-serif;
            background: #000;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .bg-overlay {
            background: url("./game-assets/background.jpg") no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        #loading-container {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading-content, #error-popup {
            width: 380px;
            text-align: center;
            background: rgba(0, 0, 0, 0.55);
            padding: 45px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #action-block {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        #context-block {
            font-size: 15px;
            color: #bbb;
            margin-bottom: 32px;
        }

        #progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #722ed1, #b37feb);
        }

        #progress-text {
            margin-top: 14px;
            font-size: 14.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        #game_frame {
            position: fixed;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 5;
            contain: strict;
        }

        #game_frame canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #error-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        #error-popup h3 {
            color: #ff453a;
            margin-bottom: 12px;
            font-size: 22px;
        }

        #error-message {
            color: #ddd;
            line-height: 1.5;
        }

        #reload-btn {
            background: #0071e3;
            color: white;
            border: none;
            padding: 13px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 22px;
        }
    </style>
</head>
<body>

    <div id="game_frame"></div>

    <div class="bg-overlay"></div>

    <div id="loading-container">
        <div id="loading-content">
            <h2 id="action-block">HRN Client</h2>
            <h2 id="context-block">Loading...</h2>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="progress-text">0%</div>
        </div>
    </div>

    <div id="error-popup">
        <h3>Connection Error</h3>
        <p id="error-message">Missing assets or no internet connection.</p>
        <button id="reload-btn" onclick="location.reload()">Try Again</button>
    </div>

    <script>
        "use strict";
        (function () {
            window.updateProgress = function (percent) {
                const rounded = Math.min(Math.round(percent || 0), 100);
                const bar = document.getElementById("progress-bar");
                const text = document.getElementById("progress-text");
                if (bar) bar.style.width = rounded + "%";
                if (text) text.textContent = rounded + "%";
            };

            function showErrorPopup(msg) {
                const popup = document.getElementById("error-popup");
                if (msg) document.getElementById("error-message").textContent = msg;
                popup.style.display = "flex";
            }

            function hideLoadingScreen() {
                const loader = document.getElementById("loading-container");
                if (loader) loader.style.display = "none";
            }

            window.addEventListener("load", async () => {
                if ("serviceWorker" in navigator) {
                    try { await navigator.serviceWorker.register("sw.js"); } catch (err) {}
                }

                try {
                    const epk = await loadCachedAssetUI("./game-assets/meta.json", true, "1.8.8-wasm")
                        .catch(async () => await loadCachedAssetUI("./game-assets/meta.json", true, "1.8.8-wasm"));

                    const listResponse = await fetch("list.json");
                    const listData = await listResponse.json();

                    const params = {
                        demoMode: false,
                        localesURI: "lang/",
                        container: "game_frame",
                        assetsURI: epk,
                        worldsDB: "worlds",
                        ...listData,
                    };

                    parseParams(params);
                    window.eaglercraftXOpts = params;

                    await new Promise(res => {
                        if (window["wispcraft-ServerReady"]) window["wispcraft-ServerReady"].then(res);
                        else setTimeout(res, 800);
                    });

                    hideLoadingScreen();
                    main();

                    setTimeout(() => {
                        if (window.__eaglercraftXBlobURLs) {
                            window.__eaglercraftXBlobURLs.forEach(url => {
                                try { URL.revokeObjectURL(url); } catch (e) {}
                            });
                            window.__eaglercraftXBlobURLs.length = 0;
                        }
                    }, 15000);
                } catch (err) {
                    console.error("Boot Error:", err);
                    showErrorPopup("Could not load game assets. Try again or check your internet.");
                }
            });
        })();
    </script>
</body>
</html>
