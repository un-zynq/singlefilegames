<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/zynq-platform/snow-rider-3d/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="description" content="Immerse yourself in Snow Rider 3D, a thrilling skiing adventure game set in breathtaking mountain landscapes.">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="TemplateData/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <style>
        /* Base page layout - Dark Mode */
        html, body {
            background: #000000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 0;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .webgl-content {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        #gameContainer {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Minimal modern black loading screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .loader-title {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .progress-box {
            width: 200px;
            height: 2px;
            background: #222222; /* Dark grey track */
            border-radius: 2px;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: #FFFFFF; /* Pure white loading indicator */
            transition: width 0.1s ease-out;
        }

        #progressText {
            color: #777777;
            margin-top: 12px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
        }
    </style>

    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
        function customProgress(gameInstance, progress) {
            var percentage = Math.min(Math.round(progress * 100), 100);
            
            var progressBar = document.getElementById("progressBar");
            var progressText = document.getElementById("progressText");
            
            if (progressBar && progressText) {
                progressBar.style.width = percentage + "%";
                progressText.innerHTML = percentage + "%";
            }

            if (typeof UnityProgress === "function") {
                UnityProgress(gameInstance, progress);
            }

            if (progress === 1 || progress === "complete") {
                var loader = document.getElementById("loadingScreen");
                if (loader) {
                    loader.style.opacity = "0";
                    loader.style.transform = "scale(0.98)";
                    setTimeout(function() {
                        loader.style.display = "none";
                    }, 400);
                }
            }
        }

        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/SnowRider3D-gd-1.json", {
            onProgress: customProgress,
            Module: {
                onRuntimeInitialized: function() {
                    customProgress(gameInstance, "complete");
                }
            }
        });
    </script>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-title">Snow Rider 3D</div>
        <div class="progress-box">
            <div id="progressBar"></div>
        </div>
        <div id="progressText">0%</div>
    </div>

    <div class="webgl-content">
        <div id="gameContainer"></div>
    </div>

</body>
</html>
