<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Backrooms 2D</title>
  <style>
    body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
    #c{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
    canvas{width:100%;height:100%;display:block;outline:none}
    #l{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:99;transition:opacity .8s}
    #r{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    #f{width:0%;height:100%;background:#fff;box-shadow:0 0 10px #fff;transition:width .3s ease-out}
  </style>
</head>
<body>
  <div id="c">
    <canvas id="cvs"></canvas>
    <div id="l"><div id="r"><div id="f"></div></div></div>
  </div>

  <script>
    (async function tightWrapper() {
      try {
        const el = id => document.getElementById(id);
        const fill = el("f"), loader = el("l"), canvas = el("cvs");
        const base = "https://cdn.jsdelivr.net/gh/un-zynq/g5/backrooms-2d/sfBuild/7-21-23";
        let createdUrls = [];

        // Helper om data op te halen, met fallback naar originele URL bij falen
        async function getAssetUrl(ext, parts) {
          try {
            let chunks = [];
            for (let i = 1; i <= parts; i++) {
              const res = await fetch(`${base}.${ext}.part${i}`, { priority: "high" });
              if (!res.ok) throw new Error("Chunk missing");
              chunks.push(await res.blob());
            }
            const url = URL.createObjectURL(new Blob(chunks));
            createdUrls.push(url);
            return url;
          } catch (e) {
            console.warn(`Fallback naar standaard URL voor ${ext} wegens:`, e.message);
            return `${base}.${ext}`; // Fallback naar de volledige file als parts falen
          }
        }

        async function init() {
          try {
            // Haal de URLs op
            const [dUrl, wUrl] = await Promise.all([
              getAssetUrl("data", 4),
              getAssetUrl("wasm", 4)
            ]);

            const config = {
              dataUrl: dUrl,
              frameworkUrl: base + ".framework.js",
              codeUrl: wUrl,
              streamingAssetsUrl: "StreamingAssets",
              companyName: "JujuProdGames",
              productName: "Backrooms 2D",
              devicePixelRatio: 1,
            };

            const script = document.createElement("script");
            script.src = base + "-loader.js";
            
            script.onload = () => {
              // De 'try' moet DIRECT om de aanroep van Unity zitten
              try {
                if (typeof createUnityInstance === "undefined") {
                  throw new Error("Unity Loader niet gedefinieerd");
                }

                createUnityInstance(canvas, config, (p) => {
                  fill.style.width = (20 + (p * 80)) + "%";
                }).then(() => {
                  fill.style.width = "100%";
                  setTimeout(() => {
                    if(loader) loader.style.opacity = "0";
                    setTimeout(() => { 
                      if(loader) loader.remove(); 
                      createdUrls.forEach(u => URL.revokeObjectURL(u));
                    }, 800);
                  }, 500);
                }).catch(err => {
                  console.error("Unity Promise Error:", err);
                  // Geen reload om loops te voorkomen, toon console error
                });

              } catch (unityErr) {
                // HIER wordt jouw specifieke 'Invalid URL' error gevangen
                console.error("Kritieke fout in createUnityInstance aanroep:", unityErr);
                
                // Laatste redding: probeer het met normale extensies als de Blobs faalden
                if (unityErr.message.includes("URL")) {
                   console.log("Poging tot nood-herstel met directe paden...");
                   config.dataUrl = base + ".data";
                   config.codeUrl = base + ".wasm";
                   // We proberen het één keer opnieuw zonder blobs
                   createUnityInstance(canvas, config, (p) => { fill.style.width = p * 100 + "%"; });
                }
              }
            };

            document.body.appendChild(script);
          } catch (e) {
            console.error("Init Error:", e);
          }
        }

        // Veilige start
        if (document.readyState === 'complete') init();
        else window.addEventListener('load', init);

      } catch (globalErr) {
        console.error("Global Script Error:", globalErr);
      }
    })();
  </script>
</body>
</html>
