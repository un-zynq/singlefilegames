<!DOCTYPE html>
<html>
  <head>
    <base href="https://cdn.jsdelivr.net/gh/zynq-platform/drift-boss/">
    <meta
      name="description"
      content="Drift Boss, Drift Boss Unblocked, Drift Boss Math Playground"
    />
    <meta property="og:image" content="drift-boss.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="game.css" />

    <style>
      html, body, #ajaxbar, #game, #webgl {
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        position: fixed !important;
        top: 0;
        left: 0;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        top: 0;
        left: 0;
        display: block !important;
      }
    </style>

    <script type="text/javascript">
      (function() {
        window.MobileAdInGamePreroll = window.MobileAdInGamePreroll || { Close: function() {} };
        window.MobileAdInGameEnd = window.MobileAdInGameEnd || { Close: function() {} };

        const originalGetElementById = document.getElementById;
        document.getElementById = function(id) {
          return originalGetElementById.call(document, id);
        };

        let resizeTicks = 0;
        function stabilizeLayout() {
          if (resizeTicks < 20) {
            resizeTicks++;
            window.dispatchEvent(new Event('resize'));
            setTimeout(stabilizeLayout, 25);
          }
        }
        // Start de layout-stabilisatie direct op de achtergrond
        stabilizeLayout();
      })();
    </script>
  </head>
  <body>
    <div id="ajaxbar">
      <div id="game">
        <canvas id="canvas" width="1280" height="720"></canvas>
      </div>
      <div id="webgl">
        <canvas id="webglcanvas" width="1280" height="720"></canvas>
      </div>
      
      <div id="orientate">
        <img src="media/graphics/orientate/landscape.jpg" />
      </div>
      <div id="play" class="play">
        <img src="media/graphics/splash/mobile/cover-start.jpg" />
      </div>

      <div id="MobileAdInGamePreroll"><div id="MobileAdInGamePreroll-Box"><div id="MobileAdInGamePreroll-Box-Header"></div><a id="MobileAdInGamePreroll-Box-Close" onclick="MobileAdInGamePreroll.Close();"></a><div id="MobileAdInGamePreroll-Box-Body"><center></center></div><div id="MobileAdInGamePreroll-Box-Footer"></div></div></div>
      <div id="MobileAdInGamePreroll2"><div id="MobileAdInGamePreroll2-Box"><div id="MobileAdInGamePreroll2-Box-Header"></div><a id="MobileAdInGamePreroll2-Box-Close" onclick="MobileAdInGamePreroll.Close();"></a><div id="MobileAdInGamePreroll2-Box-Body"><center></center></div><div id="MobileAdInGamePreroll2-Box-Footer"></div></div></div>
      <div id="MobileAdInGamePreroll3"><div id="MobileAdInGamePreroll3-Box"><div id="MobileAdInGamePreroll3-Box-Header"></div><a id="MobileAdInGamePreroll3-Box-Close" onclick="MobileAdInGamePreroll.Close();"></a><div id="MobileAdInGamePreroll3-Box-Body"><center></center></div><div id="MobileAdInGamePreroll3-Box-Footer"></div></div></div>
      <div id="MobileAdInGameHeader"></div><div id="MobileAdInGameHeader2"></div><div id="MobileAdInGameHeader3"></div><div id="MobileAdInGameFooter"></div><div id="MobileAdInGameFooter2"></div><div id="MobileAdInGameFooter3"></div>
      <div id="MobileAdInGameEnd"><div id="MobileAdInGameEnd-Box"><div id="MobileAdInGameEnd-Box-Header"></div><a id="MobileAdInGameEnd-Box-Close" onclick="MobileAdInGameEnd.Close();"></a><div id="MobileAdInGameEnd-Box-Body"><center></center></div><div id="MobileAdInGameEnd-Box-Footer"></div></div></div>
      <div id="MobileAdInGameEnd2"><div id="MobileAdInGameEnd2-Box"><div id="MobileAdInGameEnd2-Box-Header"></div><a id="MobileAdInGameEnd2-Box-Close" onclick="MobileAdInGameEnd.Close();"></a><div id="MobileAdInGameEnd2-Box-Body"><center></center></div><div id="MobileAdInGameEnd2-Box-Footer"></div></div></div>
      <div id="MobileAdInGameEnd3"><div id="MobileAdInGameEnd3-Box"><div id="MobileAdInGameEnd3-Box-Header"></div><a id="MobileAdInGameEnd3-Box-Close" onclick="MobileAdInGameEnd.Close();"></a><div id="MobileAdInGameEnd3-Box-Body"><center></center></div><div id="MobileAdInGameEnd3-Box-Footer"></div></div></div>
    </div>

    <script type="text/javascript" src="./game.js"></script>
    <script type="text/javascript">
      window.addEventListener('load', function() {
        setTimeout(function() {
          window.scrollTo(0, 1);
          window.dispatchEvent(new Event('resize'));
        }, 300);
      });
    </script>
  </body>
</html>
