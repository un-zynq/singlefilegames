<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Backrooms 2D</title>
  <style>
    body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
    #c{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
    canvas{width:100%;height:100%;display:block;outline:none}
    #l{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:99;transition:opacity .8s}
    #r{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    #f{width:0%;height:100%;background:#fff;box-shadow:0 0 10px #fff;transition:width .3s ease-out}
    #unity-warning{display:none!important}
  </style>
</head>
<body>
  <div id="c">
    <canvas id="cvs"></canvas>
    <div id="l">
      <div id="r">
        <div id="f"></div>
      </div>
    </div>
  </div>

  <script>
    /**
     * De gehele applicatie-logica is ingekapseld in een try-catch block 
     * om elke mogelijke runtime error op te vangen.
     */
    (async function globalScope() {
      try {
        const el = id => document.getElementById(id);
        const fill = el("f"), loader = el("l"), canvas = el("cvs");
        const base = "https://cdn.jsdelivr.net/gh/un-zynq/g5/backrooms-2d/sfBuild/7-21-23";
        let createdUrls = [];

        // Functie voor data ophalen
        const fetchGameData = async (ext, parts) => {
          let chunks = [];
          for (let i = 1; i <= parts; i++) {
            const response = await fetch(`${base}.${ext}.part${i}`, { 
              priority: "high",
              cache: "no-store" 
            });
            if (!response.ok) throw new Error(`Fetch failed for ${ext} part ${i}`);
            const blob = await response.blob();
            chunks.push(blob);
          }
          const finalBlob = new Blob(chunks, { type: 'application/octet-stream' });
          const objectUrl = URL.createObjectURL(finalBlob);
          createdUrls.push(objectUrl);
          return objectUrl;
        };

        // De main sequence
        const runBootloader = async () => {
          try {
            const [dUrl, wUrl] = await Promise.all([
              fetchGameData("data", 4),
              fetchGameData("wasm", 4)
            ]);

            fill.style.width = "40%";

            const config = {
              dataUrl: dUrl,
              frameworkUrl: base + ".framework.js",
              codeUrl: wUrl,
              streamingAssetsUrl: "StreamingAssets",
              companyName: "JujuProdGames",
              productName: "Backrooms 2D",
              devicePixelRatio: 1,
              matchWebGLToCanvasSize: true,
              webglContextAttributes: {
                alpha: false,
                depth: true,
                stencil: false,
                antialias: false,
                preserveDrawingBuffer: false,
                powerPreference: "high-performance",
              }
            };

            const script = document.createElement("script");
            script.src = base + "-loader.js";
            
            script.onload = () => {
              try {
                createUnityInstance(canvas, config, (p) => {
                  fill.style.width = (40 + (p * 60)) + "%";
                }).then((ui) => {
                  fill.style.width = "100%";
                  setTimeout(() => {
                    loader.style.opacity = "0";
                    setTimeout(() => {
                      if(loader) loader.remove();
                      createdUrls.forEach(url => URL.revokeObjectURL(url));
                      createdUrls = [];
                    }, 800);
                  }, 400);
                }).catch(err => {
                  console.error("Unity Instance Error:", err);
                  location.reload();
                });
              } catch (innerErr) {
                console.error("Script OnLoad Error:", innerErr);
              }
            };

            script.onerror = () => { throw new Error("Loader script failure"); };
            document.body.appendChild(script);

          } catch (e) {
            console.error("Bootloader Error:", e);
            if(!window.location.hash) {
              window.location.hash = "retry";
              location.reload();
            }
          }
        };

        // Start mechanisme binnen de try-catch
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(() => runBootloader());
        } else {
          window.addEventListener('load', () => runBootloader());
        }

      } catch (fatalError) {
        // Dit vangt fouten op die zelfs buiten de async flow optreden tijdens initialisatie
        console.error("Global Fatal Error:", fatalError);
        alert("Er is een kritieke fout opgetreden. De pagina wordt herladen.");
        location.reload();
      }
    })();
  </script>
</body>
</html>
